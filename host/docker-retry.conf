# Don't give up on docker after a quick burst of failures.
# Default StartLimitBurst=3 over StartLimitIntervalSec=10s lets a short bad
# patch put docker into a permanent failed state. Widening the window so
# transient WSL2 / kernel events that take docker down briefly can be
# auto-recovered by systemd.

[Unit]
StartLimitBurst=20
StartLimitIntervalSec=900

[Service]
RestartSec=10
